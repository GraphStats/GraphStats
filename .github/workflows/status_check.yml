name: Project Status Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  set-checking:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set Checking Status
        run: |
          python -c "
          import re

          urls = [
              ('drayko.xyz', 'https://drayko.xyz'),
              ('redirect.drayko.xyz', 'https://redirect.drayko.xyz/'),
              ('dockycalendar.drayko.xyz', 'https://dockycalendar.drayko.xyz/')
          ]

          table_rows = ['| Projet | Status | Uptime (90d) |', '| --- | --- | --- |']
          for name, url in urls:
              table_rows.append(f'| [{name}]({url}) | 🔄 Checking... | - |')

          table_content = '\n'.join(table_rows)

          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          new_readme = re.sub(
              r'<!-- START_STATUS_TABLE -->.*<!-- END_STATUS_TABLE -->',
              f'<!-- START_STATUS_TABLE -->\n{table_content}\n<!-- END_STATUS_TABLE -->',
              readme,
              flags=re.DOTALL
          )

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_readme)
          "

      - name: Commit and push Checking Status
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "docs: setting status to checking [skip ci]"
            git push origin HEAD:main
          fi

  run-health-checks:
    needs: set-checking
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check status, filter data, and calculate Uptime
        run: |
          python -c "
          import urllib.request
          import re
          import time
          import os

          urls = [
              ('drayko.xyz', 'https://drayko.xyz'),
              ('redirect.drayko.xyz', 'https://redirect.drayko.xyz/'),
              ('dockycalendar.drayko.xyz', 'https://dockycalendar.drayko.xyz/')
          ]

          DATA_FILE = 'data.txt'
          NINETY_DAYS = 90 * 24 * 60 * 60
          now = int(time.time())

          # Read and filter existing data
          data_records = []
          if os.path.exists(DATA_FILE):
              with open(DATA_FILE, 'r', encoding='utf-8') as f:
                  for line in f:
                      parts = line.strip().split(',')
                      if len(parts) == 3:
                          ts, name, status = parts
                          # Only keep data newer than 90 days
                          if now - int(ts) <= NINETY_DAYS:
                              data_records.append((int(ts), name, int(status)))

          def check_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  response = urllib.request.urlopen(req, timeout=10)
                  return response.getcode() < 400
              except Exception as e:
                  print(f'Error checking {url}: {e}')
                  return False

          current_status = {}
          for name, url in urls:
              is_up = check_url(url)
              status_int = 1 if is_up else 0
              data_records.append((now, name, status_int))
              current_status[name] = is_up

          # Write back filtered and new data
          with open(DATA_FILE, 'w', encoding='utf-8') as f:
              for ts, name, status in data_records:
                  f.write(f'{ts},{name},{status}\n')

          # Calculate uptime %
          uptime_stats = {}
          for name, url in urls:
              service_records = [r for r in data_records if r[1] == name]
              total = len(service_records)
              up_count = sum(r[2] for r in service_records)
              uptime_pct = (up_count / total * 100) if total > 0 else 0
              uptime_stats[name] = uptime_pct

          table_rows = ['| Projet | Status | Uptime (90d) |', '| --- | --- | --- |']
          for name, url in urls:
              is_up = current_status[name]
              status_icon = '🟢 Up' if is_up else '🔴 Down'
              pct = uptime_stats[name]
              table_rows.append(f'| [{name}]({url}) | {status_icon} | {pct:.2f}% |')

          table_content = '\n'.join(table_rows)

          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          new_readme = re.sub(
              r'<!-- START_STATUS_TABLE -->.*<!-- END_STATUS_TABLE -->',
              f'<!-- START_STATUS_TABLE -->\n{table_content}\n<!-- END_STATUS_TABLE -->',
              readme,
              flags=re.DOTALL
          )

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_readme)
          "

      - name: Commit and push final status
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main || true
          git add README.md data.txt
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "docs: update project status and metrics [skip ci]"
            git push origin HEAD:main
          fi
